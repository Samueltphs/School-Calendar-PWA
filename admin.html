<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Page</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
  <style>
    .event-item {
      border: 1px solid #ccc;
      padding: 12px;
      margin-bottom: 10px;
      background: #f9f9f9;
    }
    .event-item h3 {
      margin-top: 0;
    }
    .admin-button {
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <h1>Admin Dashboard</h1>

  <label>
    Search:
    <input id="search" type="search" placeholder="Search by name">
  </label>
  <br><br>
  <label>
    Filter by Event Type:
    <select id="filter">
      <option value="all">All Events</option>
      <option value="global">Staff Events (Global)</option>
      <option value="student">Student Events</option>
    </select>
  </label>
  <br><br>

  <div id="events-list"></div>

  <br>
  <button onclick="location.href='index.html'">Logout</button>

  <script>
    const role = "admin";
    const username = localStorage.getItem("currentUser") || "admin";
    const filterSelect = document.getElementById("filter");
    const searchInput = document.getElementById("search");

    function renderEvents(filterType = "all", searchTerm = "") {
      let events = getAllEvents();
      
      if (filterType === "global") {
        events = events.filter(e => e.scope === "global");
      } else if (filterType === "student") {
        events = events.filter(e => e.scope === "student");
      }

      if (searchTerm) {
        const lower = searchTerm.toLowerCase();
        events = events.filter(e => (e.name || '').toLowerCase().includes(lower));
      }

      const eventsList = document.getElementById("events-list");
      
      if (events.length === 0) {
        eventsList.innerHTML = "<p>No events found.</p>";
        return;
      }

      eventsList.innerHTML = events.map(e => `
        <div class="event-item">
          <h3>${e.name || 'Unnamed Event'}</h3>
          <p><strong>Category:</strong> ${e.category || 'N/A'}</p>
          <p><strong>Description:</strong> ${e.description || 'N/A'}</p>
          <p><strong>Date:</strong> ${e.date}</p>
          <p><strong>Scope:</strong> ${e.scope === 'global' ? 'Staff/Global' : 'Student'}</p>
          <p><strong>Created by:</strong> ${e.createdBy || 'Unknown'} (${e.createdByRole || 'unknown'})</p>
      <button class="admin-button" onclick="location.href='view-event.html?id=${e.id}'">View</button>
      <button class="admin-button" onclick="location.href='${e.scope === 'global' ? 'edit-event-staff' : 'edit-event-student'}.html?id=${e.id}'">Edit</button>
          <button class="admin-button" onclick="deleteAdminEvent('${e.id}')">Delete</button>
        </div>
      `).join("");
    }

    function viewAdminEvent(id) {
      const events = getAllEvents();
      const event = events.find(e => e.id === id);
      if (!event) return;
      alert(`Event: ${event.name}\nCategory: ${event.category}\nDescription: ${event.description}\nDate: ${event.date}\nCreated by: ${event.createdBy}\nScope: ${event.scope}`);
    }

    function editAdminEvent(id) {
      const events = getAllEvents();
      const event = events.find(e => e.id === id);
      if (!event) return;

      const name = prompt("Event name:", event.name);
      if (name === null) return;

      const category = prompt("Category:", event.category);
      if (category === null) return;

      const description = prompt("Description:", event.description);
      if (description === null) return;

      const date = prompt("Date (YYYY-MM-DD):", event.date);
      if (date === null) return;

      event.name = name;
      event.category = category;
      event.description = description;
      event.date = date;

      localStorage.setItem('events', JSON.stringify(events));
      renderEvents(filterSelect.value);
    }

    function deleteAdminEvent(id) {
      if (!confirm('Are you sure you want to delete this event?')) return;
      let events = getAllEvents();
      events = events.filter(e => e.id !== id);
      localStorage.setItem('events', JSON.stringify(events));
      renderEvents(filterSelect.value);
    }

    filterSelect.onchange = () => {
      renderEvents(filterSelect.value, searchInput.value);
    };

    searchInput.oninput = () => {
      renderEvents(filterSelect.value, searchInput.value);
    };

    renderEvents();
  </script>
</body>
</html>
