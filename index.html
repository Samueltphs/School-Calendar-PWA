<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>School Events - Login</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>
<body>
  <h1>School Events</h1>
  <h2>Login</h2>

  <label>
    Email:
    <input id="email" type="text">
  </label>
  <br><br>
  <label>
    Password:
    <input id="password" type="password">
    <button type="button" id="toggle-password">Show Password</button>
  </label>
  <br><br>
  <button id="login-btn">Login</button>
  <br><br>
  <a href="add-user.html">Add New User (Admin)</a>

  <script>
    document.getElementById("toggle-password").onclick = (e) => {
      e.preventDefault();
      const passwordInput = document.getElementById("password");
      const button = document.getElementById("toggle-password");
      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";
      button.textContent = isPassword ? "Hide Password" : "Show Password";
    };

    document.getElementById("login-btn").onclick = () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Please enter email and password.");
        return;
      }

      const user = authenticateUser(email, password);
      if (!user) {
        alert("Invalid email or password.");
        return;
      }

      localStorage.setItem("currentRole", user.role);
      localStorage.setItem("currentUser", user.username);

      if (user.role === "admin") {
        location.href = "admin.html";
      } else if (user.role === "staff") {
        location.href = "staff.html";
      } else {
        location.href = "student.html";
      }
    };
  </script>
</body>
</html>
